<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date With Me?</title>
  <style>
    body {
      background-color: #ffe6e6;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding-top: 100px;
      overflow: hidden;
      position: relative;
      height: 100vh;
    }
    h1 {
      color: #ff4d4d;
    }
    .container {
      background: rgba(255, 255, 255, 0.9);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      display: inline-block;
      position: relative;
      z-index: 10;
    }
    .btn {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px;
      text-decoration: none;
      display: inline-block;
    }
    .yes {
      background-color: #ff4d4d;
      color: white;
      font-weight: bold;
      transition: transform 0.2s;
    }
    .yes:hover {
      transform: scale(1.1);
    }
    .no {
      background-color: #ccc;
      color: white;
      position: absolute;
      transition: transform 0.1s ease;
    }
    .date-picker {
      margin: 20px 0;
    }
    input {
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    /* Floating Hearts Style */
    .heart {
      position: absolute;
      color: #ff4d4d;
      font-size: 20px;
      bottom: -20px;
      user-select: none;
      pointer-events: none;
      animation: floatUp 5s linear infinite;
    }
    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-105vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* Audio Toggle Button Style */
    .music-control {
      position: fixed;
      top: 20px;
      right: 20px;
      background: white;
      border: 2px solid #ff4d4d;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 24px;
      cursor: pointer;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <!-- Audio control toggle button -->
  <button class="music-control" id="musicBtn" onclick="toggleMusic()">🔇</button>

  <!-- Audio Element -->
  <!-- ACTION REQUIRED: Replace the URL inside src="" with your own direct audio link (.mp3) -->
  <audio id="bgMusic" loop src="https://1drv.ms/u/c/c1d86673acf6d3c0/IQCIrZd-b5miS4Sqf53i7bgtAeAM-aCCXBrqSw50GqLjshQ?e=iG81Bw"></audio>

  <div class="container" onclick="startMusicOnInteraction()">
    <h1>Will you go on a date with me? 💖</h1>
    
    <div class="date-picker">
      <p>Pick a date for our cute appointment:</p>
      <input type="date" id="dateInput">
    </div>

    <div>
      <button class="btn yes" onclick="sendEmail()">YES! ✨</button>
      <button class="btn no" id="noBtn" onmouseover="moveButton()">No</button>
    </div>
  </div>

  <script>
    const audio = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicBtn');
    let hasInteracted = false;

    // Tries to play music the very first time they click anywhere on the page
    function startMusicOnInteraction() {
      if (!hasInteracted) {
        audio.play().then(() => {
          musicBtn.innerHTML = '🔊';
          hasInteracted = true;
        }).catch(err => console.log("Autoplay blocked by browser. Awaiting manual unmute."));
      }
    }

    // Manual mute/unmute button logic
    function toggleMusic() {
      if (audio.paused) {
        audio.play();
        musicBtn.innerHTML = '🔊';
        hasInteracted = true;
      } else {
        audio.pause();
        musicBtn.innerHTML = '🔇';
      }
    }

    // Floating Hearts Background
    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '💖';
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = Math.random() * 3 + 3 + 's'; 
      heart.style.fontSize = Math.random() * 20 + 10 + 'px';
      document.body.appendChild(heart);
      setTimeout(() => { heart.remove(); }, 6000);
    }
    setInterval(createHeart, 300);

    // Email Logic
    function sendEmail() {
      const chosenDate = document.getElementById('dateInput').value;
      let message = "I would love to go on a date with you!";
      if (chosenDate) {
        message += " Let's do it on " + chosenDate + ".";
      }
      const myEmail = "your-email@example.com"; // Remember to update this!
      const subject = encodeURIComponent("It's a Date! 💖");
      const body = encodeURIComponent(message);
      window.location.href = `mailto:${myEmail}?subject=${subject}&body=${body}`;
    }

    // Playful Button Logic
    function moveButton() {
      const btn = document.getElementById('noBtn');
      const x = Math.random() * 200 - 100;
      const y = Math.random() * 200 - 100;
      btn.style.transform = `translate(${x}px, ${y}px)`;
    }
  </script>

</body>
</html>
